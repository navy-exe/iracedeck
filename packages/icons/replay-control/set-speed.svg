<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a3a4a"/>

    <!-- Icon content area: Speedometer/gauge icon -->
    <!-- Gauge arc -->
    <path d="M 42 72 A 30 30 0 1 1 102 72" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <!-- Gauge needle pointing right -->
    <line x1="72" y1="52" x2="90" y2="40" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="72" cy="52" r="4" fill="#ffffff"/>
    <!-- Tick marks -->
    <line x1="46" y1="52" x2="50" y2="52" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="28" x2="72" y2="32" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="98" y1="52" x2="94" y2="52" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
