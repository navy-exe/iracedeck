<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3a2a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Helmet outline (dome shape) -->
    <path d="M38 62 Q38 24 72 24 Q106 24 106 62 L106 68 Q106 74 100 74 L44 74 Q38 74 38 68 Z"
          fill="none" stroke="{{graphic1Color}}" stroke-width="4" stroke-linejoin="round"/>

    <!-- Visor slit -->
    <path d="M46 48 Q46 42 56 42 L88 42 Q98 42 98 48 L98 56 Q98 60 92 60 L52 60 Q46 60 46 56 Z"
          fill="{{graphic1Color}}" opacity="0.3" stroke="{{graphic1Color}}" stroke-width="2"/>

    <!-- Tear-off motion arrow (pulling upward-right) -->
    <path d="M86 52 L104 34" fill="none" stroke="{{graphic1Color}}" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 3"/>
    <polyline points="98,32 104,34 100,40" fill="none" stroke="{{graphic1Color}}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="116" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="138" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
