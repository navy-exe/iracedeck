<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a2a3a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: car body side-view with circular reset arrow (yellow) -->
    <!-- Car body outline (slightly smaller/repositioned to leave room for reset arrow) -->
    <path d="M18 68 L18 58 L36 58 L48 44 L88 44 L100 58 L118 58 L118 68 Z"
          fill="none" stroke="{{graphic1Color}}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Windshield -->
    <path d="M51 58 L58 47 L81 47 L88 58 Z"
          fill="none" stroke="{{graphic1Color}}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Rear wheel -->
    <circle cx="41" cy="70" r="9" fill="none" stroke="{{graphic1Color}}" stroke-width="4"/>
    <circle cx="41" cy="70" r="3.5" fill="{{graphic1Color}}"/>
    <!-- Front wheel -->
    <circle cx="96" cy="70" r="9" fill="none" stroke="{{graphic1Color}}" stroke-width="4"/>
    <circle cx="96" cy="70" r="3.5" fill="{{graphic1Color}}"/>

    <!-- Circular reset arrow (yellow) - above car, right side -->
    <!-- Arc: 270 degrees (almost full circle) with gap at top-right -->
    <path d="M128 26 A16 16 0 1 0 134 36"
          fill="none" stroke="#f39c12" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrowhead at end of arc -->
    <polyline points="128,28 134,36 124,38" fill="none" stroke="#f39c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
