<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#2a2a4a"/>

  <!-- Steering wheel -->
  <circle cx="36" cy="26" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="36" cy="26" r="4" fill="none" stroke="#888888" stroke-width="1.5"/>
  <line x1="36" y1="22" x2="36" y2="14" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="28" x2="24" y2="30" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="28" x2="48" y2="30" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Two-line label -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">FORCE</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="8">FEEDBACK</text>
</svg>
