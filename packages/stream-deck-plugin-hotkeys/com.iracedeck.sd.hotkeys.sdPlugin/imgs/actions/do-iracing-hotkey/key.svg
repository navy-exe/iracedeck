<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Keyboard key outline -->
  <rect x="12" y="12" width="48" height="36" rx="4" ry="4"
        fill="none"
        stroke="#d94a4a"
        stroke-width="2.5"
        stroke-linejoin="round"/>
  <!-- Key cap depression effect -->
  <rect x="16" y="16" width="40" height="28" rx="2" ry="2"
        fill="none"
        stroke="#d94a4a"
        stroke-width="1.5"
        stroke-linejoin="round"/>
  <!-- iRacing "i" indicator -->
  <circle cx="54" cy="18" r="6" fill="#d94a4a"/>
  <text x="54" y="21" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">i</text>
  <!-- Key text -->
  <text x="36" y="35" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">iRacing</text>
</svg>
