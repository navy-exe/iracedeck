<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="sdpi-components.js"></script>
		<style>
			.default-binding {
				color: #999;
				font-size: 11px;
				margin-left: 8px;
			}
			.override-section {
				margin-top: 8px;
				padding-top: 8px;
				border-top: 1px solid #3a3a3a;
			}
			.override-header {
				font-size: 11px;
				color: #999;
				margin-bottom: 4px;
			}
		</style>
	</head>
	<body>
		<sdpi-item label="Preset">
			<sdpi-select setting="presetId" id="presetSelect">
				<optgroup label="Black Box">
					<option value="blackbox-timing">Lap Timing (F1)</option>
					<option value="blackbox-standings">Standings (F2)</option>
					<option value="blackbox-relative">Relative (F3)</option>
					<option value="blackbox-fuel">Fuel (F4)</option>
					<option value="blackbox-tires">Tire Pressure (F5)</option>
					<option value="blackbox-tire-info">Tire Info (F6)</option>
					<option value="blackbox-pit-adjustments">Pit Adjustments (F7)</option>
					<option value="blackbox-car-adjustments">Car Adjustments (F8)</option>
				</optgroup>
				<optgroup label="Controls">
					<option value="control-starter">Starter (S)</option>
					<option value="control-ignition">Ignition (I)</option>
					<option value="control-pit-limiter">Pit Limiter (A)</option>
					<option value="control-tow">Tow/Reset (Shift+R)</option>
					<option value="control-bias-increase">Brake Bias + (=)</option>
					<option value="control-bias-decrease">Brake Bias - (-)</option>
				</optgroup>
				<optgroup label="Camera">
					<option value="camera-look-left">Look Left (Z)</option>
					<option value="camera-look-right">Look Right (X)</option>
				</optgroup>
				<optgroup label="Misc">
					<option value="misc-chat">Text Chat (T)</option>
					<option value="misc-delta">Splits/Delta (Tab)</option>
				</optgroup>
			</sdpi-select>
		</sdpi-item>
		<sdpi-item label="Override Key">
			<sdpi-select setting="overrideKey">
				<option value="">Use preset default</option>
				<optgroup label="Function Keys">
					<option value="f1">F1</option>
					<option value="f2">F2</option>
					<option value="f3">F3</option>
					<option value="f4">F4</option>
					<option value="f5">F5</option>
					<option value="f6">F6</option>
					<option value="f7">F7</option>
					<option value="f8">F8</option>
					<option value="f9">F9</option>
					<option value="f10">F10</option>
					<option value="f11">F11</option>
					<option value="f12">F12</option>
				</optgroup>
				<optgroup label="Letters">
					<option value="a">A</option>
					<option value="b">B</option>
					<option value="c">C</option>
					<option value="d">D</option>
					<option value="e">E</option>
					<option value="f">F</option>
					<option value="g">G</option>
					<option value="h">H</option>
					<option value="i">I</option>
					<option value="j">J</option>
					<option value="k">K</option>
					<option value="l">L</option>
					<option value="m">M</option>
					<option value="n">N</option>
					<option value="o">O</option>
					<option value="p">P</option>
					<option value="q">Q</option>
					<option value="r">R</option>
					<option value="s">S</option>
					<option value="t">T</option>
					<option value="u">U</option>
					<option value="v">V</option>
					<option value="w">W</option>
					<option value="x">X</option>
					<option value="y">Y</option>
					<option value="z">Z</option>
				</optgroup>
				<optgroup label="Numbers">
					<option value="0">0</option>
					<option value="1">1</option>
					<option value="2">2</option>
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5">5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
				</optgroup>
				<optgroup label="Navigation">
					<option value="up">Up Arrow</option>
					<option value="down">Down Arrow</option>
					<option value="left">Left Arrow</option>
					<option value="right">Right Arrow</option>
					<option value="home">Home</option>
					<option value="end">End</option>
					<option value="pageup">Page Up</option>
					<option value="pagedown">Page Down</option>
				</optgroup>
				<optgroup label="Special Keys">
					<option value="tab">Tab</option>
					<option value="space">Space</option>
					<option value="enter">Enter</option>
					<option value="escape">Escape</option>
					<option value="backspace">Backspace</option>
					<option value="delete">Delete</option>
				</optgroup>
				<optgroup label="Symbols">
					<option value="=">=</option>
					<option value="-">-</option>
					<option value="[">[</option>
					<option value="]">]</option>
					<option value="/">/</option>
					<option value="\">\</option>
					<option value=";">;</option>
					<option value="'">'</option>
					<option value=",">,</option>
					<option value=".">.</option>
					<option value="`">`</option>
				</optgroup>
			</sdpi-select>
		</sdpi-item>
		<sdpi-item label="Override Modifiers">
			<sdpi-checkbox setting="overrideCtrl">Ctrl</sdpi-checkbox>
			<sdpi-checkbox setting="overrideShift">Shift</sdpi-checkbox>
			<sdpi-checkbox setting="overrideAlt">Alt</sdpi-checkbox>
		</sdpi-item>
		<sdpi-item label="Icon Color">
			<sdpi-color setting="iconColor" default="#d94a4a"></sdpi-color>
		</sdpi-item>
	</body>
</html>
