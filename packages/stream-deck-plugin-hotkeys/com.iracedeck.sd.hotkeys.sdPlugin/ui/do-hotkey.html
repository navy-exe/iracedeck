<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Key">
			<sdpi-select setting="key">
				<optgroup label="Function Keys">
					<option value="f1">F1</option>
					<option value="f2">F2</option>
					<option value="f3">F3</option>
					<option value="f4">F4</option>
					<option value="f5">F5</option>
					<option value="f6">F6</option>
					<option value="f7">F7</option>
					<option value="f8">F8</option>
					<option value="f9">F9</option>
					<option value="f10">F10</option>
					<option value="f11">F11</option>
					<option value="f12">F12</option>
				</optgroup>
				<optgroup label="Letters">
					<option value="a">A</option>
					<option value="b">B</option>
					<option value="c">C</option>
					<option value="d">D</option>
					<option value="e">E</option>
					<option value="f">F</option>
					<option value="g">G</option>
					<option value="h">H</option>
					<option value="i">I</option>
					<option value="j">J</option>
					<option value="k">K</option>
					<option value="l">L</option>
					<option value="m">M</option>
					<option value="n">N</option>
					<option value="o">O</option>
					<option value="p">P</option>
					<option value="q">Q</option>
					<option value="r">R</option>
					<option value="s">S</option>
					<option value="t">T</option>
					<option value="u">U</option>
					<option value="v">V</option>
					<option value="w">W</option>
					<option value="x">X</option>
					<option value="y">Y</option>
					<option value="z">Z</option>
				</optgroup>
				<optgroup label="Numbers">
					<option value="0">0</option>
					<option value="1">1</option>
					<option value="2">2</option>
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5">5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
				</optgroup>
				<optgroup label="Navigation">
					<option value="up">Up Arrow</option>
					<option value="down">Down Arrow</option>
					<option value="left">Left Arrow</option>
					<option value="right">Right Arrow</option>
					<option value="home">Home</option>
					<option value="end">End</option>
					<option value="pageup">Page Up</option>
					<option value="pagedown">Page Down</option>
				</optgroup>
				<optgroup label="Special Keys">
					<option value="tab">Tab</option>
					<option value="space">Space</option>
					<option value="enter">Enter</option>
					<option value="escape">Escape</option>
					<option value="backspace">Backspace</option>
					<option value="delete">Delete</option>
				</optgroup>
				<optgroup label="Symbols">
					<option value="=">=</option>
					<option value="-">-</option>
					<option value="[">[</option>
					<option value="]">]</option>
					<option value="/">/</option>
					<option value="\">\</option>
					<option value=";">;</option>
					<option value="'">'</option>
					<option value=",">,</option>
					<option value=".">.</option>
					<option value="`">`</option>
				</optgroup>
			</sdpi-select>
		</sdpi-item>
		<sdpi-item label="Modifiers">
			<sdpi-checkbox setting="ctrl">Ctrl</sdpi-checkbox>
			<sdpi-checkbox setting="shift">Shift</sdpi-checkbox>
			<sdpi-checkbox setting="alt">Alt</sdpi-checkbox>
		</sdpi-item>
		<sdpi-item label="Custom Label">
			<sdpi-textfield
				setting="label"
				placeholder="Leave empty to show key combination"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Icon Color">
			<sdpi-color setting="iconColor" default="#4a90d9"></sdpi-color>
		</sdpi-item>
	</body>
</html>
