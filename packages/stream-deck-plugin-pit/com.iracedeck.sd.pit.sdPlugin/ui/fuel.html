<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Amount (L)">
			<sdpi-textfield
				id="amount"
				setting="amount"
				placeholder="1"
				type="number"
				min="0.1"
				max="100"
				step="0.1"
			></sdpi-textfield>
		</sdpi-item>
		<script>
			document.getElementById("amount").addEventListener("input", (e) => {
				e.target.value = e.target.value.replace(",", ".");
			});
		</script>
	</body>
</html>
