<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="mostlySkyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a8b99"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
  </defs>
  <!-- Background - grayish sky -->
  <rect width="72" height="72" fill="url(#mostlySkyBg)" rx="8"/>
  <!-- Hint of sun behind clouds -->
  <circle cx="18" cy="18" r="10" fill="#d4a54a" opacity="0.4"/>
  <!-- Large cloud coverage -->
  <ellipse cx="36" cy="32" rx="24" ry="14" fill="#d0d0d0"/>
  <ellipse cx="20" cy="36" rx="16" ry="10" fill="#c8c8c8"/>
  <ellipse cx="52" cy="36" rx="14" ry="10" fill="#c8c8c8"/>
  <ellipse cx="36" cy="26" rx="14" ry="8" fill="#e0e0e0"/>
  <!-- Lower cloud layer -->
  <ellipse cx="28" cy="52" rx="18" ry="10" fill="#b8b8b8"/>
  <ellipse cx="50" cy="54" rx="14" ry="8" fill="#b8b8b8"/>
</svg>
