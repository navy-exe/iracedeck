<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="partlySkyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90c2"/>
      <stop offset="100%" style="stop-color:#2d5a7b"/>
    </linearGradient>
    <radialGradient id="sunGlowPartly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffeb3b"/>
      <stop offset="100%" style="stop-color:#ffc107"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" fill="url(#partlySkyBg)" rx="8"/>
  <!-- Sun (partially visible) -->
  <circle cx="24" cy="22" r="12" fill="url(#sunGlowPartly)"/>
  <!-- Sun rays -->
  <g stroke="#ffeb3b" stroke-width="2" stroke-linecap="round">
    <line x1="24" y1="4" x2="24" y2="8"/>
    <line x1="8" y1="22" x2="12" y2="22"/>
    <line x1="12" y1="10" x2="15" y2="13"/>
  </g>
  <!-- Cloud -->
  <ellipse cx="44" cy="44" rx="16" ry="10" fill="#fff" opacity="0.95"/>
  <ellipse cx="32" cy="46" rx="12" ry="8" fill="#fff" opacity="0.95"/>
  <ellipse cx="52" cy="48" rx="10" ry="7" fill="#fff" opacity="0.95"/>
  <ellipse cx="40" cy="38" rx="10" ry="7" fill="#fff" opacity="0.95"/>
</svg>
