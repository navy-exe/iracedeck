<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="clearSkyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc"/>
      <stop offset="100%" style="stop-color:#003d7a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffeb3b"/>
      <stop offset="70%" style="stop-color:#ffc107"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </radialGradient>
  </defs>
  <!-- Background - clear blue sky -->
  <rect width="72" height="72" fill="url(#clearSkyBg)" rx="8"/>
  <!-- Sun -->
  <circle cx="36" cy="32" r="14" fill="url(#sunGlow)"/>
  <!-- Sun rays -->
  <g stroke="#ffeb3b" stroke-width="2" stroke-linecap="round">
    <line x1="36" y1="10" x2="36" y2="14"/>
    <line x1="36" y1="50" x2="36" y2="54"/>
    <line x1="14" y1="32" x2="18" y2="32"/>
    <line x1="54" y1="32" x2="58" y2="32"/>
    <line x1="20" y1="16" x2="23" y2="19"/>
    <line x1="49" y1="45" x2="52" y2="48"/>
    <line x1="52" y1="16" x2="49" y2="19"/>
    <line x1="23" y1="45" x2="20" y2="48"/>
  </g>
</svg>
