name: Release - Build Stream Dock Plugin

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Remove dev dependencies
        run: pnpm install --prod --no-frozen-lockfile

      - name: Pack Stream Dock plugin
        run: |
          $version = if ("${{ github.ref_name }}".StartsWith("v")) { "${{ github.ref_name }}".TrimStart("v") } else { "dev" }
          Compress-Archive -Path "packages/stream-dock-plugin/com.iracedeck.dock.core.sdPlugin/*" -DestinationPath "iracedeck-dock-v${version}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdock-plugin
          path: iracedeck-dock-v*.zip

      - name: Attach plugin to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iracedeck-dock-v*.zip
